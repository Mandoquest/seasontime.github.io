name: Destiny Season Timer

on:
  schedule:
    - cron: '0 18 * * 2'  # Jeden Dienstag um 18:00 UTC (nach Reset)
  workflow_dispatch:        # Auch manuell auslösbar

jobs:
  fetch-season-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Season-Daten abrufen
        env:
          BUNGIE_API_KEY: ${{ secrets.BUNGIE_API_KEY }}
        run: python scripts/fetch_season.py

      - name: Daten committen
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add season.json
          git diff --staged --quiet || git commit -m "Season data updated"
          git push
